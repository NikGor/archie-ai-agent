# UI Answer pipeline tests: full-format responses for real-world user scenarios

- name: "weather london"
  input: "какая завтра погода в Лондоне?"
  response_format: ui_answer
  stage: full
  judge: true
  expect:
    content_not_empty: true
    min_ui_items: 1
    expected_item_types: [weather_card]
    has_quick_actions: true
    max_total_tokens: 25000
    max_latency_ms: 35000

